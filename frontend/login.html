<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Hope International Academy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#13294b',
                        secondary: '#C5A059',
                        dark: '#0f172a'
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    }
                }
            }
        }
    </script>
</head>

<body
    class="bg-slate-50 font-sans text-slate-800 flex items-center justify-center min-h-screen bg-gradient-to-br from-primary to-slate-900">
    <div class="bg-white p-10 rounded-2xl shadow-2xl w-full max-w-md border border-white/20">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-serif font-bold text-primary mb-2">Admin Portal</h1>
            <p class="text-slate-500 text-sm">Hope International Academy</p>
        </div>

        <form id="login-form" class="space-y-6">
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">Password</label>
                <div class="relative">
                    <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    <input type="password" id="admin-password" required placeholder="Enter admin password"
                        class="w-full pl-12 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-lg outline-none focus:border-secondary transition-colors">
                </div>
            </div>

            <div id="login-error" class="text-red-500 text-sm font-medium hidden"></div>

            <button type="submit"
                class="w-full bg-secondary text-white font-bold py-3 rounded-lg hover:bg-primary transition-colors hover:shadow-lg flex items-center justify-center gap-2">
                <span>Access Dashboard</span>
                <i class="fas fa-arrow-right"></i>
            </button>
        </form>

        <div class="mt-8 text-center">
            <a href="/" class="text-sm text-slate-500 hover:text-primary transition-colors"><i
                    class="fas fa-home mr-1"></i> Return to Site</a>
        </div>
    </div>
    <script src="login.js"></script>
</body>

</html>
